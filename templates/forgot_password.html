{% extends 'base.html' %}
{% block title %}Recover Account | Bates Brackets{% endblock %}
{% block content %}
<section class="card auth-card">
  <h1>Recover Account</h1>
  <p class="sub">Enter your email and we will send a password reset link.</p>

  <form method="post" class="stack">
    <label>Email</label>
    <input type="email" name="email" required />
    <button type="submit">Send Reset Link</button>
  </form>

  <p class="muted"><a href="{{ url_for('login') }}">Back to login</a></p>
</section>
{% endblock %}
